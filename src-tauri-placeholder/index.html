<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Track Republic</title>
    <style>
      html, body {
        margin: 0;
        min-height: 100%;
        background: #0f131a;
        color: #f4f7fb;
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", sans-serif;
      }
      body {
        display: grid;
        place-items: center;
      }
      .shell {
        display: grid;
        gap: 12px;
        text-align: center;
        padding: 24px;
      }
      .kicker {
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: #37d4ff;
      }
      h1 {
        margin: 0;
        font-size: 32px;
        line-height: 1;
      }
      p {
        margin: 0;
        color: #97a1af;
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <div class="kicker">Track Republic</div>
      <h1>Starting desktop app…</h1>
      <p>Launching the local production server.</p>
    </main>
  </body>
</html>
